<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>君の領域</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#000;color:#fff;font-family:'Noto Serif JP',serif;text-align:center}
h1{font-family:'DotGothic16',monospace;color:#ff0040;text-shadow:0 0 15px #ff0040}

#game{max-width:380px;margin:auto;padding:10px}

#anime{
 height:150px;
 background:#111;
 border-radius:10px;
 margin:10px;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 overflow:hidden;
}

#anime img{
 width:100px;
 border-radius:10px;
 margin-bottom:5px;
}

#animeText{
 font-size:14px;
 color:#ffcccc;
}

#reels{display:flex;justify-content:center;margin:10px}
.reel{width:80px;height:80px;background:#111;border:2px solid #fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:36px}

button{margin:5px;padding:10px;border:none;border-radius:8px;cursor:pointer}
#lever{background:#ff0033;color:#fff}
.stop{background:#0099ff}

#score{margin:10px}

.domain{
 animation:domain 0.3s infinite;
}
@keyframes domain{
0%{background:#000}50%{background:#330000}100%{background:#000}
}

.cutin{
 animation:cutin 0.4s;
}
@keyframes cutin{
0%{transform:translateX(-100%)}100%{transform:translateX(0)}
}

</style>
</head>
<body>

<h1>🎰 領域展開スロット</h1>

<div id="game">

<div id="anime">
<img id="charImg" src="https://via.placeholder.com/100x100.png?text=キャラ">
<div id="animeText">静寂…何かが始まる</div>
</div>

<div id="reels">
<div class="reel" id="r1">?</div>
<div class="reel" id="r2">?</div>
<div class="reel" id="r3">?</div>
</div>

<button id="lever">領域突入</button><br>
<button class="stop" onclick="stopReel(0)">STOP1</button>
<button class="stop" onclick="stopReel(1)">STOP2</button>
<button class="stop" onclick="stopReel(2)">STOP3</button>

<div id="score">スコア:0</div>
<div id="result"></div>

</div>

<script>
const symbols=["🎲","🔥","💥","7","💎"];
let reels=["?","?","?"];
let spinning=[false,false,false];
let intervals=[null,null,null];
let score=0;
let kakuhen=false;

const imgList=[
 "https://via.placeholder.com/100x100.png?text=主人公",
 "https://via.placeholder.com/100x100.png?text=ヒロイン",
 "https://via.placeholder.com/100x100.png?text=ライバル"
];

function setAnime(text){
 const anime=document.getElementById("anime");
 const txt=document.getElementById("animeText");
 const img=document.getElementById("charImg");

 anime.classList.remove("cutin");
 void anime.offsetWidth;
 anime.classList.add("cutin");

 txt.textContent=text;
 img.src=imgList[Math.floor(Math.random()*imgList.length)];
}

lever.onclick=()=>{
 setAnime("領域展開──運命の抽選開始");
 document.body.classList.add("domain");

 for(let i=0;i<3;i++){
  spinning[i]=true;
  intervals[i]=setInterval(()=>{
    reels[i]=symbols[Math.floor(Math.random()*symbols.length)];
    document.getElementById("r"+(i+1)).textContent=reels[i];
  },80+i*40);
 }
};

function stopReel(i){
 if(!spinning[i])return;
 clearInterval(intervals[i]);
 spinning[i]=false;
 if(spinning.every(v=>!v))check();
}

function check(){
 const [a,b,c]=reels;
 const res=document.getElementById("result");

 if(kakuhen && Math.random()<0.6){
   reels=["7","7","7"];
 }

 if(a===b && b===c){
   if(a==="7"){
     setAnime("完全勝利──領域継続");
     score+=300;
     kakuhen=true;
     res.textContent="確変継続";
   } else {
     setAnime("的中──ボーナス獲得");
     score+=150;
     res.textContent="BONUS";
   }
 } else if(a===b || b===c || a===c){
   setAnime("期待度上昇…！");
   res.textContent="リーチ";
   if(Math.random()<0.5){
     setTimeout(()=>{
       setAnime("カットイン──決めろ！");
       lever.onclick();
     },1000);
   }
 } else {
   setAnime("不発──領域崩壊");
   res.textContent="ハズレ";
   document.body.classList.remove("domain");
 }

 document.getElementById("score").textContent="スコア:"+score;
}
</script>

</body>
</html>
